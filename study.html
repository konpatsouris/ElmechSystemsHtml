<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Τεχνική Μελέτη — ELMECH SYSTEMS</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ========== THEME (ΙΔΙΟ) ========== */
:root{
 --navy:#1a3a5f;--navy-dark:#112840;--navy-mid:#254e80;--navy-light:#3a6fa8;
 --accent:#e8a020;--accent-bg:rgba(232,160,32,.1);
 --success:#1e7e4a;--success-bg:#eaf5ee;
 --danger:#c0392b;--grey-bg:#eef1f5;--grey-bdr:#d8dfe8;
 --txt:#1c2b3a;--txt-soft:#5a6b7c;--r:6px;--t:.22s ease
}
*{box-sizing:border-box;margin:0;padding:0}
body{
 font-family:'Barlow',sans-serif;
 background:var(--grey-bg);
 color:var(--txt);
 min-height:100vh;
 display:flex;
 flex-direction:column
}

/* ── Topbar ── */
.topbar{
 background:var(--navy-dark);
 border-bottom:3px solid var(--accent);
 height:60px;
 padding:0 40px;
 display:flex;
 align-items:center;
 gap:16px
}
.logo{
 font-family:'Barlow Condensed';
 font-size:1.3rem;
 font-weight:800;
 letter-spacing:.08em;
 color:white
}
.logo em{
 font-size:.62rem;
 letter-spacing:.2em;
 color:var(--accent);
 margin-left:6px
}
.topbar-module{
 margin-left:auto;
 font-size:.72rem;
 letter-spacing:.14em;
 color:rgba(255,255,255,.45);
 text-transform:uppercase
}

/* ── Layout ── */
.layout{
 flex:1;
 display:grid;
 grid-template-columns:320px 1fr;
 min-height:0
}

/* ── Sidebar ── */
.sidebar{
 background:white;
 border-right:1px solid var(--grey-bdr);
 display:flex;
 flex-direction:column
}
.sb-head{
 padding:18px 20px;
 border-bottom:1px solid var(--grey-bdr)
}
.sb-head h3{
 font-family:'Barlow Condensed';
 font-size:1rem;
 font-weight:700;
 color:var(--navy)
}
.sb-head p{
 font-size:.72rem;
 color:var(--txt-soft);
 margin-top:4px
}
.order-list{
 padding:8px;
 overflow-y:auto
}
.order-item{
 padding:12px 14px;
 border-radius:var(--r);
 cursor:pointer;
 border:1.5px solid transparent;
 transition:all var(--t)
}
.order-item:hover{
 background:var(--grey-bg);
 border-color:var(--grey-bdr)
}
.order-item.selected{
 background:rgba(26,58,95,.07);
 border-color:var(--navy-light)
}
.oi-id{
 font-family:'Barlow Condensed';
 font-size:.9rem;
 font-weight:700;
 color:var(--navy)
}
.oi-cust{
 font-size:.8rem;
 color:var(--txt-soft)
}

/* ── Main ── */
.main{
 display:flex;
 flex-direction:column;
 min-height:0
}
.empty{
 flex:1;
 display:flex;
 align-items:center;
 justify-content:center;
 color:var(--grey-mid);
 font-size:.85rem;
 padding:40px
}

/* ── Panels ── */
.panel{
 background:white;
 margin:16px 28px;
 border:1px solid var(--grey-bdr);
 border-radius:var(--r);
 box-shadow:0 6px 24px rgba(26,58,95,.13);
 overflow:hidden
}
.ph{
 background:var(--navy);
 padding:18px 28px;
 display:flex;
 gap:14px;
 color:white
}
.ph h2{
 font-family:'Barlow Condensed';
 font-size:1.2rem;
}
.pb{
 padding:24px 28px;
 display:flex;
 flex-direction:column;
 gap:18px
}

.note-box{
 background:var(--accent-bg);
 border-left:4px solid var(--accent);
 border-radius:var(--r);
 padding:14px;
 font-size:.85rem;
 line-height:1.6
}

/* ── Products (defined by engineer) ── */
.prod-list{
 display:flex;
 flex-direction:column;
 gap:10px
}
.prod-row{
 display:grid;
 grid-template-columns:1fr 90px 36px;
 gap:8px;
 align-items:end;
 padding:12px;
 background:var(--grey-bg);
 border:1.5px solid var(--grey-bdr);
 border-radius:var(--r)
}
.prod-row input{
 padding:8px 10px;
 border-radius:var(--r);
 border:1.5px solid var(--grey-bdr);
 font-size:.85rem
}
.rm-btn{
 background:white;
 border:1.5px solid var(--grey-bdr);
 border-radius:var(--r);
 cursor:pointer
}
.add-btn{
 padding:10px;
 border:1.5px dashed var(--grey-bdr);
 border-radius:var(--r);
 background:transparent;
 font-weight:600;
 color:var(--navy-light);
 cursor:pointer
}

/* ── Actions ── */
.actions{
 display:flex;
 justify-content:flex-end;
 gap:10px;
 padding-top:18px;
 border-top:1px solid var(--grey-bdr)
}
.btn{
 padding:10px 22px;
 border-radius:var(--r);
 font-family:'Barlow Condensed';
 font-weight:700;
 cursor:pointer;
 border:none
}
.btn-ghost{
 background:transparent;
 border:1.5px solid var(--grey-bdr)
}
.btn-success{
 background:var(--success);
 color:white
}
</style>
</head>

<body>

<header class="topbar">
 <div class="logo">ELMECH SYSTEMS <em>Industrial ERP</em></div>
 <div class="topbar-module">Τεχνική Μελέτη</div>
</header>

<div class="layout">

<!-- Sidebar -->
<aside class="sidebar">
 <div class="sb-head">
  <h3>Σύνθετες Παραγγελίες</h3>
  <p>Απαιτούν τεχνική μελέτη</p>
 </div>
 <div class="order-list" id="orderList"></div>
</aside>

<!-- Main -->
<main class="main">

 <div class="empty" id="empty">
  Επιλέξτε σύνθετη παραγγελία για μελέτη
 </div>

 <div class="panel" id="panel" style="display:none">

  <div class="ph">
   <h2 id="ordId">—</h2>
  </div>

  <div class="pb">
   <div>
     <strong>Πελάτης:</strong>
     <span id="cust"></span>
   </div>

   <div>
     <strong>Ημερομηνία Μελέτης:</strong>
     <span id="sdate"></span>
   </div>

   <div>
     <strong>Περιγραφή Αιτήματος</strong>
     <div class="note-box" id="notes"></div>
   </div>

   <div>
     <strong>Απαραίτητα Προϊόντα (ορίζονται από Μελέτη)</strong>
     <div class="prod-list" id="prodList"></div>
     <button class="add-btn" onclick="addRow()">+ Προσθήκη Προϊόντος</button>
   </div>

   <div class="actions">
     <button class="btn btn-ghost" onclick="reset()">Ακύρωση</button>
     <button class="btn btn-success" onclick="complete()">Ολοκλήρωση Μελέτης</button>
   </div>
  </div>

 </div>

</main>
</div>

<script>
const ORDERS=[
{
 id:'#ORD-2025-060',
 customer:'Νίκος Παπαδόπουλος',
 date:'30/04/2025',
 notes:'Αντλιοστάσιο γεώτρησης. Απαιτείται ειδική βάση και inverter.'
}
];

let selected=null, rowN=0;

function init(){
 const list=document.getElementById('orderList');
 ORDERS.forEach((o,i)=>{
  const d=document.createElement('div');
  d.className='order-item';
  d.innerHTML=`<div class="oi-id">${o.id}</div><div class="oi-cust">${o.customer}</div>`;
  d.onclick=()=>select(i);
  list.appendChild(d);
 })
}

function select(i){
 selected=i;
 document.querySelectorAll('.order-item').forEach(e=>e.classList.remove('selected'));
 document.querySelectorAll('.order-item')[i].classList.add('selected');
 const o=ORDERS[i];
 document.getElementById('empty').style.display='none';
 document.getElementById('panel').style.display='block';
 ordId.textContent=o.id;
 cust.textContent=o.customer;
 sdate.textContent=o.date;
 notes.textContent=o.notes;
 prodList.innerHTML='';
 rowN=0;
}

function addRow(){
 rowN++;
 const r=document.createElement('div');
 r.className='prod-row';
 r.innerHTML=`
  <input placeholder="Κωδικός προϊόντος"/>
  <input type="number" min="1" value="1"/>
  <button class="rm-btn" onclick="this.parentElement.remove()">✕</button>`;
 prodList.appendChild(r);
}

function complete(){
 if(!document.querySelector('#prodList input')){
  alert('Ορίστε τουλάχιστον ένα προϊόν');
  return;
 }
 alert('✅ Η τεχνική μελέτη ολοκληρώθηκε και προωθήθηκε στην Αποθήκη');
 reset();
}

function reset(){
 panel.style.display='none';
 empty.style.display='flex';
 document.querySelectorAll('.order-item').forEach(e=>e.classList.remove('selected'));
}

init();
</script>

</body>
</html>
