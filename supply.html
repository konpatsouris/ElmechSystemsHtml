<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ελλείψεις & Προμηθευτές — ELMECH SYSTEMS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root{
      --navy:#1a3a5f;
      --navy-dark:#112840;
      --accent:#e8a020;
      --success:#1e7e4a;
      --warning:#c88a16;
      --grey-bg:#eef1f5;
      --grey-bdr:#d8dfe8;
      --txt:#1c2b3a;
      --txt-soft:#5a6b7c;
      --white:#fff;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Barlow',sans-serif;
      background:var(--grey-bg);
      color:var(--txt);
    }

    /* ── TOPBAR (ΙΔΙΟ ΜΕ ΠΡΩΤΟ ΑΡΧΕΙΟ) ── */
    .topbar{
      background:var(--navy-dark);
      border-bottom:3px solid var(--accent);
      padding:0 40px;
      height:60px;
      display:flex;
      align-items:center;
      gap:16px;
    }

    .logo{
      font-family:'Barlow Condensed',sans-serif;
      font-size:1.3rem;
      font-weight:800;
      letter-spacing:.08em;
      color:var(--white);
      display:flex;
      align-items:baseline;
      gap:10px;
    }

    .logo em{
      font-style:normal;
      font-size:.62rem;
      font-weight:500;
      letter-spacing:.2em;
      color:var(--accent);
      text-transform:uppercase;
    }

    .topbar-module{
      margin-left:auto;
      font-size:.72rem;
      font-weight:600;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(255,255,255,.45);
    }

    main{
      max-width:1100px;
      margin:auto;
      padding:30px 40px;
    }

    h2{
      font-family:'Barlow Condensed',sans-serif;
      margin-bottom:20px;
      font-size:1.3rem;
      color:var(--navy);
    }

    .supplier{
      background:white;
      border-radius:6px;
      border:1px solid var(--grey-bdr);
      margin-bottom:18px;
    }

    .supplier-header{
      background:#f4f6f9;
      padding:12px 16px;
      display:flex;
      justify-content:space-between;
      font-weight:700;
      font-size:.85rem;
      color:var(--navy);
    }

    .supplier-items{
      padding:12px 16px;
    }

    .item{
      display:flex;
      align-items:center;
      gap:14px;
      padding:6px 0;
      font-size:.85rem;
      border-bottom:1px dashed var(--grey-bdr);
    }
    .item:last-child{border-bottom:none}

    .code{
      width:170px;
      font-family:'Barlow Condensed',sans-serif;
      font-weight:700;
    }

    .qty{color:var(--txt-soft)}

    .btn-select{
      margin-left:auto;
      padding:5px 12px;
      font-size:.65rem;
      font-family:'Barlow Condensed',sans-serif;
      font-weight:700;
      border-radius:4px;
      border:1px solid var(--grey-bdr);
      cursor:pointer;
      background:white;
    }

    .item.pending{background:#fff6e6}
    .item.pending .btn-select{
      background:var(--navy);
      color:white;
      border:none;
    }

    .item.sent{opacity:.55}
    .item.sent .code{text-decoration:line-through}

    .actions{
      margin-top:24px;
      display:flex;
      gap:14px;
    }

    .actions button{
      padding:10px 22px;
      font-family:'Barlow Condensed',sans-serif;
      font-weight:700;
      border-radius:6px;
      border:none;
      cursor:pointer;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .send{background:var(--navy);color:white}
    .clear{background:white;border:1px solid var(--grey-bdr)}

    @media (max-width:580px){
      .topbar{padding:0 20px}
    }
  </style>
</head>

<body>

<header class="topbar">
  <div class="logo">
    ELMECH SYSTEMS <em>Industrial ERP</em>
  </div>
  <div class="topbar-module">
    Ελλείψεις & Προμηθευτές
  </div>
</header>

<main>
  <h2>Συγκεντρωτική Λίστα Ελλείψεων</h2>
  <div id="suppliers"></div>

  <div class="actions">
    <button class="send" onclick="sendAll()">Συνολική Αποστολή</button>
    <button class="clear" onclick="clearAll()">Ακύρωση</button>
  </div>
</main>

<script>
/* Demo shortages */
if(!localStorage.getItem('SHORTAGES')){
  localStorage.setItem('SHORTAGES', JSON.stringify([
    { code:'GRU-CM5-6-A', qty:5 },
    { code:'PMP-DW3-KIT', qty:1 },
    { code:'VLV-GATE-DN50', qty:4 },
    { code:'FIL-WF80-SS', qty:6 }
  ]));
}

const SUPPLIERS=[
  {id:'S1',name:'HYDROTECH AE',email:'orders@hydrotech.gr',products:['GRU-CM5-6-A','PMP-DW3-KIT']},
  {id:'S2',name:'VALVEMASTER ΕΠΕ',email:'sales@valvemaster.gr',products:['VLV-GATE-DN50']},
  {id:'S3',name:'INDUSTRIAL PARTS SA',email:'info@indparts.gr',products:['FIL-WF80-SS']}
];

const RAW=JSON.parse(localStorage.getItem('SHORTAGES')||'[]');

const merged={};
RAW.forEach(p=>{
  if(!merged[p.code]) merged[p.code]={code:p.code,qty:0,status:'idle'};
  merged[p.code].qty+=p.qty;
});

const groups={};
Object.values(merged).forEach(p=>{
  const sup=SUPPLIERS.find(s=>s.products.includes(p.code));
  const key=sup?sup.id:'OTHER';
  if(!groups[key]){
    groups[key]={supplier:sup||{name:'Χωρίς Αντιστοίχιση',email:'—'},items:[]};
  }
  groups[key].items.push(p);
});

const root=document.getElementById('suppliers');
Object.values(groups).forEach(g=>{
  const div=document.createElement('div');
  div.className='supplier';
  div.innerHTML=`
    <div class="supplier-header">
      <span>${g.supplier.name}</span>
      <span>${g.supplier.email}</span>
    </div>
    <div class="supplier-items">
      ${g.items.map(i=>`
        <div class="item" data-code="${i.code}">
          <span class="code">${i.code}</span>
          <span class="qty">${i.qty} τεμ.</span>
          <button class="btn-select" onclick="toggleSelect('${i.code}')">
            Προς Αποστολή
          </button>
        </div>
      `).join('')}
    </div>`;
  root.appendChild(div);
});

function toggleSelect(code){
  const item=Object.values(merged).find(i=>i.code===code);
  const row=document.querySelector(`.item[data-code="${code}"]`);
  if(item.status==='idle'){item.status='pending';row.classList.add('pending')}
  else{item.status='idle';row.classList.remove('pending')}
}

function sendAll(){
  const toSend=Object.values(merged).filter(i=>i.status==='pending');
  if(!toSend.length){alert('Δεν υπάρχουν επιλεγμένα προϊόντα.');return;}
  toSend.forEach(i=>{
    i.status='sent';
    const row=document.querySelector(`.item[data-code="${i.code}"]`);
    row.classList.remove('pending');
    row.classList.add('sent');
    row.querySelector('button').disabled=true;
    row.querySelector('button').innerText='Στάλθηκε';
  });
  alert('✔ Η αποστολή ολοκληρώθηκε (demo).');
}

function clearAll(){
  localStorage.removeItem('SHORTAGES');
  location.reload();
}
</script>

</body>
</html>
