<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ελλείψεις & Προμηθευτές — ELMECH SYSTEMS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root{
      --navy:#1a3a5f;
      --navy-dark:#112840;
      --navy-mid:#254e80;
      --navy-light:#3a6fa8;
      --accent:#e8a020;
      --accent-dim:#b87d12;
      --accent-bg:rgba(232,160,32,.1);
      --success:#1e7e4a;
      --success-bg:#eaf5ee;
      --danger:#c0392b;
      --danger-bg:#fdf0ee;
      --grey-bg:#eef1f5;
      --grey-bdr:#d8dfe8;
      --grey-mid:#8a9ab0;
      --white:#ffffff;
      --txt:#1c2b3a;
      --txt-soft:#5a6b7c;
      --r:6px;
      --sh-md:0 6px 24px rgba(26,58,95,.13);
      --t:.22s ease;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{font-size:15px}

    body{
      font-family:'Barlow',sans-serif;
      background:var(--grey-bg);
      color:var(--txt);
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* ── Topbar (ίδιο με Orders) ── */
    .topbar{
      background:var(--navy-dark);
      border-bottom:3px solid var(--accent);
      padding:0 40px;
      height:60px;
      display:flex;
      align-items:center;
      gap:16px;
      flex-shrink:0;
    }
    .logo{
      font-family:'Barlow Condensed',sans-serif;
      font-size:1.3rem;
      font-weight:800;
      letter-spacing:.08em;
      color:var(--white);
      display:flex;
      align-items:baseline;
      gap:10px;
    }
    .logo em{
      font-style:normal;
      font-size:.62rem;
      font-weight:500;
      letter-spacing:.2em;
      color:var(--accent);
      text-transform:uppercase;
    }
    .topbar-module{
      margin-left:auto;
      font-size:.72rem;
      font-weight:600;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(255,255,255,.45);
    }

    /* ── Page ── */
    main{
      flex:1;
      padding:32px 40px 56px;
      max-width:1100px;
      width:100%;
      margin:auto;
    }

    h2{
      font-family:'Barlow Condensed',sans-serif;
      font-size:1.3rem;
      font-weight:700;
      color:var(--navy);
      margin-bottom:18px;
    }

    /* ── Supplier Card ── */
    .supplier{
      background:var(--white);
      border:1.5px solid var(--grey-bdr);
      border-radius:var(--r);
      box-shadow:var(--sh-md);
      margin-bottom:18px;
      overflow:hidden;
    }

    .supplier-header{
      background:var(--grey-bg);
      padding:14px 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .supplier-header span:first-child{
      font-family:'Barlow Condensed',sans-serif;
      font-size:.95rem;
      font-weight:700;
      color:var(--navy);
      letter-spacing:.05em;
    }
    .supplier-header span:last-child{
      font-size:.75rem;
      color:var(--txt-soft);
    }

    .supplier-items{
      padding:14px 18px;
    }

    .item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:6px 0;
      font-size:.85rem;
      border-bottom:1px dashed var(--grey-bdr);
    }
    .item:last-child{border-bottom:none}

    .code{
      font-family:'Barlow Condensed',sans-serif;
      font-weight:700;
      letter-spacing:.03em;
      color:var(--navy);
    }
    .qty{
      font-size:.8rem;
      color:var(--txt-soft);
    }

    /* ── Actions ── */
    .actions{
      margin-top:24px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      padding:10px 22px;
      border-radius:var(--r);
      font-family:'Barlow Condensed',sans-serif;
      font-size:.9rem;
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
      cursor:pointer;
      border:none;
      transition:all var(--t);
    }
    .btn-send{
      background:var(--navy);
      color:var(--white);
    }
    .btn-send:hover{
      background:var(--navy-mid);
      box-shadow:0 4px 14px rgba(26,58,95,.3);
      transform:translateY(-1px);
    }
    .btn-clear{
      background:transparent;
      border:1.5px solid var(--grey-bdr);
      color:var(--txt-soft);
    }
    .btn-clear:hover{
      background:var(--grey-bg);
      border-color:var(--grey-mid);
    }

    @media (max-width:580px){
      .topbar{padding:0 20px}
      main{padding:24px 20px 40px}
    }
  </style>
</head>

<body>

<header class="topbar">
  <div class="logo">
    ELMECH SYSTEMS <em>Industrial ERP</em>
  </div>
  <div class="topbar-module">
    Ελλείψεις & Προμηθευτές
  </div>
</header>

<main>
  <h2>Συγκεντρωτική Λίστα Ελλείψεων</h2>
  <div id="suppliers"></div>

  <div class="actions">
    <button class="btn btn-send" onclick="sendAll()">
      Συνολική Αποστολή σε Προμηθευτές
    </button>
    <button class="btn btn-clear" onclick="clearAll()">
      Καθαρισμός Λίστας
    </button>
  </div>
</main>

<script>
/* ── Προμηθευτές ───────────────────────────── */
const SUPPLIERS = [
  { id:'SUP1', name:'HYDROTECH AE', email:'orders@hydrotech.gr',
    products:['GRU-CM5-6-A','GRU-CM2-4-B','PMP-DW3-KIT'] },
  { id:'SUP2', name:'VALVEMASTER EΠΕ', email:'sales@valvemaster.gr',
    products:['VLV-GATE-DN50'] },
  { id:'SUP3', name:'INDUSTRIAL PARTS SA', email:'info@indparts.gr',
    products:['FIL-WF80-SS','CAB-PVC-25M'] }
];

const RAW = JSON.parse(localStorage.getItem('SHORTAGES') || '[]');

/* ── Merge ── */
const merged = {};
RAW.forEach(p=>{
  if(!merged[p.code]){
    merged[p.code]={...p,qty:0,orders:[]};
  }
  merged[p.code].qty+=p.qty;
  merged[p.code].orders.push(p.orderId);
});

/* ── Group ── */
const groups={};
Object.values(merged).forEach(p=>{
  const sup=SUPPLIERS.find(s=>s.products.includes(p.code));
  const key=sup?sup.id:'OTHER';
  if(!groups[key]){
    groups[key]={supplier:sup||{name:'Χωρίς Αντιστοίχιση',email:'—'},items:[]};
  }
  groups[key].items.push(p);
});

/* ── Render ── */
const root=document.getElementById('suppliers');
Object.values(groups).forEach(g=>{
  const div=document.createElement('div');
  div.className='supplier';
  div.innerHTML=`
    <div class="supplier-header">
      <span>${g.supplier.name}</span>
      <span>${g.supplier.email}</span>
    </div>
    <div class="supplier-items">
      ${g.items.map(i=>`
        <div class="item">
          <span class="code">${i.code}</span>
          <span class="qty">${i.qty} τεμ.</span>
        </div>
      `).join('')}
    </div>`;
  root.appendChild(div);
});

/* ── Actions ── */
function sendAll(){
  alert('✔ Η συνολική λίστα ελλείψεων απεστάλη (demo).');
}
function clearAll(){
  localStorage.removeItem('SHORTAGES');
  location.reload();
}
</script>

</body>
</html>
